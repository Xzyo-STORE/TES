<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XZYO STORE | FIX QRIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS SINGKAT UNTUK TEST */
        :root { --bg:#010409; --card:#0d1117; --primary:#00d2ff; --text:#f0f6fc; --border:#30363d; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; max-width: 400px; margin: auto; }
        
        /* BOX QRIS HARUS PUTIH BIAR BISA DI SCAN */
        #qris-display { 
            display: none; /* Awalnya sembunyi */
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            margin-top: 20px;
        }
        #gambar-qris { width: 100%; height: auto; display: block; }
        .btn { background: var(--primary); color: #000; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .slide { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <div id="slide-1" class="slide active">
        <div class="card">
            <h3>XZYO STORE</h3>
            <input type="text" id="userRoblox" placeholder="Username" style="width:90%; padding:10px; margin-bottom:10px;">
            <p>Pilih Metode:</p>
            <button class="btn" onclick="pilih('QRIS')">QRIS (OTOMATIS)</button>
            <button class="btn" onclick="pilih('DANA')" style="background:#0086ff; color:white;">DANA (MANUAL)</button>
        </div>
    </div>

    <div id="slide-2" class="slide">
        <div class="card">
            <h3 id="payMethodInfo">Selesaikan Pembayaran</h3>
            <p>Total: <span id="payNominal" style="color:var(--primary); font-weight:bold;">Rp 15.000</span></p>
            
            <div id="qris-display">
                <p style="color:black; font-weight:bold; margin-bottom:10px;">SCAN QRIS XZYO</p>
                <img id="gambar-qris" src="" alt="QRIS">
            </div>

            <button class="btn" style="background:#555; color:white; margin-top:20px;" onclick="location.reload()">KEMBALI</button>
        </div>
    </div>

    <script>
        let selectedPay = "";

        function pilih(m) {
            selectedPay = m;
            prosesTest();
        }

        function prosesTest() {
            // 1. Pindah Slide
            document.getElementById('slide-1').classList.remove('active');
            document.getElementById('slide-2').classList.add('active');

            const qrisBox = document.getElementById('qris-display');
            const infoTeks = document.getElementById('payMethodInfo');
            const gbrQR = document.getElementById('gambar-qris');
            
            // Link Drive Kamu (Sudah format direct download)
            const linkQRIS = "https://drive.google.com/uc?export=view&id=1LkkjYoIP_Iy_LQx4KEm8TtXiI5q57IfJ";

            if (selectedPay === "QRIS") {
                infoTeks.innerText = "METODE QRIS";
                
                // ISI SOURCE GAMBAR
                gbrQR.src = linkQRIS;
                
                // PAKSA DISPLAY BLOCK
                qrisBox.style.display = "block";
                console.log("QRIS Berhasil Ditampilkan");
            } else {
                qrisBox.style.display = "none";
                infoTeks.innerText = "TRANSFER DANA: 089677323404";
                console.log("Metode Manual - QRIS Disembunyikan");
            }
        }
    </script>
</body>
</html>
